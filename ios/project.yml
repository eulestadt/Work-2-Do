name: GetWorkToDo
options:
  bundleIdPrefix: com.getworktodo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true
targets:
  GetWorkToDo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GetWorkToDo
        excludes: ["*.xcassets"]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.getworktodo.app
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: GetWorkToDo/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - target: GetWorkToDoWidget
  GetWorkToDoWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - GetWorkToDoWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.getworktodo.app.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: GetWorkToDoWidget/Info.plist
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: GetWorkToDoWidget/GetWorkToDoWidget.entitlements
    dependencies: []
